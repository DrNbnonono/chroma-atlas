<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>配色与风格参考</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="palettes.jsx"></script>
<script type="text/babel" src="palettes-3.jsx"></script>
<script type="text/babel" src="demo-card.jsx"></script>
<script type="text/babel" src="styles.jsx"></script>
<script type="text/babel" src="styles-2.jsx"></script>
<script type="text/babel" src="styles-3.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas title="配色 & 风格参考库" subtitle="同一个『音乐播放器』Demo，用不同的配色 / 风格演绎。点击任一卡片可全屏查看。">
        <DCSection id="palettes" title="🎨 配色方案 Color Palettes" subtitle="结构相同，仅替换色板 — 用于直接对比色彩气质">
          {window.PALETTES.map((p) => (
            <DCArtboard key={p.id} id={`pal-${p.id}`} label={p.name} width={360} height={420}>
              <div style={{ padding: 20, background: p.bg, width: '100%', height: '100%', boxSizing: 'border-box', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <window.PaletteCard p={p} />
              </div>
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="styles" title="✨ 风格方案 Visual Styles" subtitle="同样的内容，完全不同的视觉语言 — 用于探索整体风格方向">
          {window.STYLES.map((st) => (
            <DCArtboard key={st.id} id={`sty-${st.id}`} label={st.name} width={360} height={460}>
              <div style={{ padding: 20, background: '#F5F5F5', width: '100%', height: '100%', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
                <st.Comp />
                <div style={{ fontSize: 11, color: '#888', textAlign: 'center', maxWidth: 300, lineHeight: 1.5 }}>{st.desc}</div>
              </div>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
