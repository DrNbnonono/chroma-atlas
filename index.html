<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>配色 × 风格参考库</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #F5F1EA; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #1F1A14;
  }
  #root { min-height: 100vh; }
  #boot-error {
    position: fixed; inset: 0; background: #1F1A14; color: #FFE0CC;
    font-family: monospace; padding: 40px; white-space: pre-wrap; overflow: auto;
    z-index: 9999; display: none;
  }
</style>
</head>
<body>
<div id="root">
  <div style="padding: 40px; text-align: center; color: #6B635A;">加载中…</div>
</div>
<pre id="boot-error"></pre>

<script>
  window.addEventListener('error', (e) => {
    const el = document.getElementById('boot-error');
    if (el) { el.style.display = 'block'; el.textContent = '[ERROR] ' + (e.message || e.error || 'unknown') + '\n\n' + (e.filename || '') + ':' + (e.lineno || ''); }
    console.error(e);
  });
  window.addEventListener('unhandledrejection', (e) => {
    const el = document.getElementById('boot-error');
    if (el) { el.style.display = 'block'; el.textContent = '[PROMISE] ' + (e.reason && e.reason.message || e.reason); }
  });
</script>

<!-- Bootstrap: load React, ReactDOM, Babel, then JSX files in order -->
<script>
  function showError(msg) {
    const el = document.getElementById('boot-error');
    if (el) { el.style.display = 'block'; el.textContent = msg; }
    console.error(msg);
  }

  function loadScript(src, testGlobal) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => {
        const start = Date.now();
        (function check() {
          if (typeof window[testGlobal] !== 'undefined') return resolve();
          if (Date.now() - start > 5000) return reject(new Error('Global ' + testGlobal + ' not found after ' + src + ' loaded'));
          setTimeout(check, 20);
        })();
      };
      s.onerror = () => reject(new Error('Failed to load ' + src));
      document.head.appendChild(s);
    });
  }

  const REMOTE_DEPS = [
    { src: 'vendor/react.production.min.js', global: 'React' },
    { src: 'vendor/react-dom.production.min.js', global: 'ReactDOM' },
    { src: 'vendor/babel.min.js', global: 'Babel' },
  ];
  const LOCAL_DEPS = [
    'src/lib/chrome.js',
    'src/lib/router.js',
    'src/data/product.js',
  ];
  const JSX_FILES = [
    'src/components/dashboard-mockups.jsx',
    'src/components/product-blocks.jsx',
    'src/data/palettes.jsx',
    'src/data/palettes-3.jsx',
    'src/data/styles.jsx',
    'src/data/styles-2.jsx',
    'src/data/styles-3.jsx',
    'src/components/demo-card.jsx',
    'src/components/hero-header.jsx',
    'src/components/home-grid.jsx',
    'src/detail/layouts.jsx',
    'src/detail/variants.jsx',
    'src/detail/sections/hero.jsx',
    'src/detail/sections/tokens.jsx',
    'src/detail/sections/variants.jsx',
    'src/detail/sections/pairings.jsx',
    'src/detail/sections/page-in-action.jsx',
    // Per-style immersive pages (10 flagship styles). Each file
    // self-registers into window.STYLE_PAGES[id] = { theme, Page }.
    'src/detail/styles/_shared.jsx',
    'src/detail/styles/cyber.jsx',
    'src/detail/styles/glass.jsx',
    'src/detail/styles/memphis.jsx',
    'src/detail/styles/pixel.jsx',
    'src/detail/styles/bento.jsx',
    'src/detail/styles/editorial.jsx',
    'src/detail/styles/clay.jsx',
    'src/detail/styles/vapor.jsx',
    'src/detail/styles/holo.jsx',
    'src/detail/styles/softui.jsx',
    'src/detail/detail-view.jsx',
    'app.jsx',
  ];

  function loadLocalScript(path) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = path;
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load ' + path));
      document.head.appendChild(s);
    });
  }

  async function loadAndCompileJSX(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error('Failed to fetch ' + path + ': ' + res.status);
    const src = await res.text();
    let compiled;
    try {
      compiled = window.Babel.transform(src, {
        presets: ['env', 'react'],
        filename: path,
      }).code;
    } catch (e) {
      throw new Error('Babel transform failed for ' + path + ': ' + e.message + '\n\nSource (first 500 chars):\n' + src.slice(0, 500));
    }
    const s = document.createElement('script');
    s.textContent = compiled;
    document.body.appendChild(s);
  }

  async function bootstrap() {
    try {
      for (const dep of REMOTE_DEPS) {
        await loadScript(dep.src, dep.global);
      }
      for (const f of LOCAL_DEPS) {
        await loadLocalScript(f);
      }
      for (const f of JSX_FILES) {
        await loadAndCompileJSX(f);
      }
    } catch (e) {
      showError('[BOOT] ' + (e.message || e));
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootstrap);
  } else {
    bootstrap();
  }
</script>
</body>
</html>
